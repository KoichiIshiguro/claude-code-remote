<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Claude Code Remote</title>
  <meta name="theme-color" content="#0d1117">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Claude">
  <link rel="manifest" href="/manifest.json">
  <link rel="apple-touch-icon" href="/icons/icon.svg">
  <link rel="icon" href="/icons/icon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="/style.css">
  <script>if('serviceWorker' in navigator) navigator.serviceWorker.register('/sw.js').catch(()=>{});</script>
  <style>
    .projects-grid {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
      gap: 12px;
      align-content: start;
    }
    .project-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 18px 14px 14px;
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      gap: 10px;
      cursor: pointer;
      transition: border-color .15s, background .15s;
      position: relative;
    }
    .project-card:hover { border-color: var(--accent); background: var(--surface2); }
    .project-card .proj-icon { font-size: 28px; }
    .project-card .proj-name {
      font-size: 14px;
      font-weight: 500;
      word-break: break-all;
      line-height: 1.3;
    }
    .project-card .proj-status {
      font-size: 11px;
      color: var(--green);
      display: none;
      align-items: center;
      gap: 4px;
    }
    .project-card.active .proj-status { display: flex; }
    .project-card.active { border-color: var(--green); }
    .project-card .proj-status::before {
      content: '';
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--green);
      flex-shrink: 0;
    }
    /* New project card */
    .project-card.new-card {
      border-style: dashed;
      border-color: var(--border);
      color: var(--text-muted);
      align-items: center;
      justify-content: center;
      min-height: 110px;
    }
    .project-card.new-card:hover { border-color: var(--accent); color: var(--accent); }
    .project-card.new-card .plus { font-size: 28px; line-height: 1; }
    .project-card.new-card .new-label { font-size: 13px; font-weight: 500; }
    /* New project modal */
    .modal-overlay {
      display: none;
      position: fixed; inset: 0;
      background: rgba(0,0,0,.6);
      z-index: 100;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .modal-overlay.open { display: flex; }
    .modal {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 24px;
      width: 100%;
      max-width: 360px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
    .modal h2 { font-size: 16px; font-weight: 600; }
    .modal input {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--text);
      padding: 10px 12px;
      font-size: 15px;
      outline: none;
      width: 100%;
    }
    .modal input:focus { border-color: var(--accent); }
    .modal .modal-hint { font-size: 12px; color: var(--text-muted); }
    .modal .modal-actions { display: flex; gap: 8px; justify-content: flex-end; }
    .btn-cancel {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text-muted);
      padding: 8px 16px;
      border-radius: var(--radius-sm);
      cursor: pointer;
      font-size: 14px;
    }
    .btn-cancel:hover { background: var(--surface2); }
    .section-label {
      padding: 8px 16px 0;
      font-size: 12px;
      color: var(--text-muted);
      font-weight: 600;
      letter-spacing: .05em;
      text-transform: uppercase;
    }
    .proj-sess-count {
      font-size: 11px;
      color: var(--text-muted);
    }
    /* Sessions modal */
    .sess-modal { max-width: 480px; gap: 12px; }
    .sess-modal h2 { display: flex; align-items: baseline; gap: 8px; }
    .sess-modal h2 .dir { font-size: 12px; color: var(--text-muted); font-weight: 400; word-break: break-all; }
    .sess-list { display: flex; flex-direction: column; gap: 6px; max-height: 60vh; overflow-y: auto; }
    .sess-row {
      display: flex; align-items: center; gap: 10px;
      padding: 10px 12px; border-radius: var(--radius-sm);
      background: var(--surface2); border: 1px solid var(--border);
      cursor: pointer; transition: border-color .12s;
    }
    .sess-row:hover { border-color: var(--accent); }
    .sess-row .dot { width: 7px; height: 7px; border-radius: 50%; background: var(--border); flex-shrink: 0; }
    .sess-row.running .dot { background: var(--green); }
    .sess-row .label { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; font-size: 13px; }
    .sess-row .when { font-size: 11px; color: var(--text-muted); flex-shrink: 0; }
    .sess-new-row {
      display: flex; align-items: center; justify-content: center; gap: 6px;
      padding: 10px 12px; border-radius: var(--radius-sm);
      background: transparent; border: 1px dashed var(--border);
      cursor: pointer; color: var(--text-muted); font-size: 13px;
      transition: all .12s;
    }
    .sess-new-row:hover { border-color: var(--accent); color: var(--accent); }
  </style>
</head>
<body class="page">
  <div class="header">
    <span style="font-size:20px">🤖</span>
    <h1>Claude Code Remote</h1>
    <a href="/auth/logout" class="btn btn-sm" style="background:transparent;border:1px solid var(--border);color:var(--text-muted);padding:6px 12px;font-size:13px;border-radius:6px;">Logout</a>
  </div>

  <div class="section-label" id="sectionLabel">Projects</div>
  <div class="projects-grid" id="grid">
    <div class="project-card new-card" id="newCard">
      <span class="plus">+</span>
      <span class="new-label">New Project</span>
    </div>
    <div class="project-card new-card" id="importCard" title="Upload a .zip of an existing project">
      <span class="plus">⬆</span>
      <span class="new-label">Import .zip</span>
    </div>
    <div class="project-card new-card" id="cloneCard" title="git clone a remote repository">
      <span class="plus">⎇</span>
      <span class="new-label">Clone from Git</span>
    </div>
  </div>
  <input type="file" id="zipInput" accept=".zip,application/zip" style="display:none">

  <!-- Git clone modal -->
  <div class="modal-overlay" id="cloneOverlay">
    <div class="modal">
      <h2>Clone from Git</h2>
      <input type="text" id="cloneUrlInput" placeholder="https://github.com/user/repo.git" autocomplete="off" spellcheck="false">
      <p class="modal-hint">Supports https, ssh, and git@host:user/repo form. Private repos need keys/credentials already configured on the server.</p>
      <div class="modal-actions">
        <button class="btn-cancel" id="cloneCancelBtn">Cancel</button>
        <button class="btn btn-primary btn-sm" id="cloneRunBtn">Clone</button>
      </div>
    </div>
  </div>

  <!-- Sessions for a project modal -->
  <div class="modal-overlay" id="sessOverlay">
    <div class="modal sess-modal">
      <h2><span id="sessModalName"></span><span class="dir" id="sessModalDir"></span></h2>
      <div class="sess-list" id="sessModalList"></div>
      <div class="sess-new-row" id="sessNewRow">+ Start new session</div>
      <div class="modal-actions">
        <button class="btn-cancel" id="sessCancelBtn">Close</button>
      </div>
    </div>
  </div>

  <!-- New project modal -->
  <div class="modal-overlay" id="modalOverlay">
    <div class="modal">
      <h2>New Project</h2>
      <input type="text" id="projectNameInput" placeholder="my-project" autocomplete="off" spellcheck="false">
      <p class="modal-hint" id="modalHint">Created under your project root.</p>
      <div class="modal-actions">
        <button class="btn-cancel" id="cancelBtn">Cancel</button>
        <button class="btn btn-primary btn-sm" id="createBtn">Create</button>
      </div>
    </div>
  </div>

  <script>
    // Pin history so browser back / iOS swipe-back can't leave the app.
    (function lockHistory() {
      const PIN_DEPTH = 5;
      function pin() {
        for (let i = 0; i < PIN_DEPTH; i++) {
          try { history.pushState({ _pinned: 1, t: Date.now() + i }, '', location.href); } catch {}
        }
      }
      pin();
      window.addEventListener('popstate', pin);
      window.addEventListener('pageshow', (e) => { if (e.persisted) pin(); });
    })();

    const ws = new WebSocket(`${location.protocol === 'https:' ? 'wss' : 'ws'}://${location.host}`);

    // Sessions grouped by directory.
    let sessionsByDir = {};

    ws.addEventListener('open', () => {
      ws.send(JSON.stringify({ type: 'list_sessions' }));
    });
    ws.addEventListener('message', (e) => {
      const msg = JSON.parse(e.data);
      if (msg.type === 'sessions_list') {
        sessionsByDir = {};
        for (const s of (msg.sessions || [])) {
          if (!sessionsByDir[s.directory]) sessionsByDir[s.directory] = [];
          sessionsByDir[s.directory].push(s);
        }
        for (const arr of Object.values(sessionsByDir)) {
          arr.sort((a, b) => new Date(b.lastActivity) - new Date(a.lastActivity));
        }
        refreshCards();
      }
      if (msg.type === 'session_created') {
        location.href = `/terminal?session=${msg.session.id}`;
      }
      if (msg.type === 'error') {
        alert(msg.message);
      }
    });

    // Load projects from API
    let projects = [];
    let baseDir = '';

    async function loadProjects() {
      const res = await fetch('/api/projects');
      const data = await res.json();
      projects = data.projects || [];
      baseDir = data.base || '';
      document.getElementById('modalHint').textContent = baseDir
        ? `Created under ${baseDir}/`
        : 'Set BASE_DIR in .env to enable project creation.';
      refreshCards();
    }

    function refreshCards() {
      const grid = document.getElementById('grid');
      // Remove old project cards, keep new-card
      Array.from(grid.querySelectorAll('.project-card:not(.new-card)')).forEach(el => el.remove());

      const label = document.getElementById('sectionLabel');
      label.textContent = projects.length
        ? (baseDir ? `Projects (${baseDir})` : 'Projects')
        : 'No projects yet';

      projects.forEach(proj => {
        const sessList = sessionsByDir[proj.path] || [];
        const anyRunning = sessList.some(s => s.streaming);
        const card = document.createElement('div');
        card.className = `project-card${anyRunning ? ' active' : ''}`;
        const countLabel = sessList.length === 0 ? 'No sessions'
                         : sessList.length === 1 ? '1 session'
                         : `${sessList.length} sessions`;
        card.innerHTML = `
          <span class="proj-icon">📁</span>
          <span class="proj-name">${escHtml(proj.name)}</span>
          <span class="proj-sess-count">${countLabel}</span>
          <span class="proj-status">Running</span>`;
        card.addEventListener('click', () => openProject(proj));
        grid.insertBefore(card, document.getElementById('newCard'));
      });
    }

    function openProject(proj) {
      const list = sessionsByDir[proj.path] || [];
      if (list.length === 0) {
        // No sessions yet — preserve the one-click flow.
        ws.send(JSON.stringify({ type: 'create_session', directory: proj.path }));
        return;
      }
      if (list.length === 1) {
        location.href = `/terminal?session=${list[0].id}`;
        return;
      }
      openSessionsModal(proj);
    }

    function openSessionsModal(proj) {
      const list = sessionsByDir[proj.path] || [];
      document.getElementById('sessModalName').textContent = proj.name;
      document.getElementById('sessModalDir').textContent = proj.path;
      const ul = document.getElementById('sessModalList');
      ul.innerHTML = '';
      for (const s of list) {
        const row = document.createElement('div');
        row.className = `sess-row${s.streaming ? ' running' : ''}`;
        const label = (s.preview && s.preview.trim()) ? s.preview : 'New session';
        row.innerHTML = `
          <span class="dot"></span>
          <span class="label">${escHtml(label)}</span>
          <span class="when">${formatWhen(s.lastActivity)}</span>`;
        row.addEventListener('click', () => { location.href = `/terminal?session=${s.id}`; });
        ul.appendChild(row);
      }
      document.getElementById('sessNewRow').onclick = () => {
        ws.send(JSON.stringify({ type: 'create_session', directory: proj.path }));
      };
      document.getElementById('sessOverlay').classList.add('open');
    }

    function formatWhen(iso) {
      if (!iso) return '';
      const d = new Date(iso); const now = new Date();
      const diff = (now - d) / 1000;
      if (diff < 60) return 'just now';
      if (diff < 3600) return `${Math.floor(diff/60)}m ago`;
      if (diff < 86400) return `${Math.floor(diff/3600)}h ago`;
      return d.toLocaleDateString();
    }

    document.getElementById('sessCancelBtn').addEventListener('click', () => {
      document.getElementById('sessOverlay').classList.remove('open');
    });
    document.getElementById('sessOverlay').addEventListener('click', (e) => {
      if (e.target === e.currentTarget) e.currentTarget.classList.remove('open');
    });

    // New project modal
    document.getElementById('newCard').addEventListener('click', () => {
      document.getElementById('projectNameInput').value = '';
      document.getElementById('modalOverlay').classList.add('open');
      document.getElementById('projectNameInput').focus();
    });
    document.getElementById('cancelBtn').addEventListener('click', closeModal);
    document.getElementById('modalOverlay').addEventListener('click', (e) => {
      if (e.target === e.currentTarget) closeModal();
    });
    document.getElementById('projectNameInput').addEventListener('keydown', (e) => {
      if (e.key === 'Enter') createProject();
      if (e.key === 'Escape') closeModal();
    });
    document.getElementById('createBtn').addEventListener('click', createProject);

    function closeModal() {
      document.getElementById('modalOverlay').classList.remove('open');
    }

    async function createProject() {
      const name = document.getElementById('projectNameInput').value.trim();
      if (!name) return;
      const res = await fetch('/api/projects', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ name }),
      });
      const data = await res.json();
      if (data.error) { alert(data.error); return; }
      closeModal();
      // Reload projects then open the new one
      await loadProjects();
      ws.send(JSON.stringify({ type: 'create_session', directory: data.path }));
    }

    // Clone from Git
    const cloneCard = document.getElementById('cloneCard');
    const cloneOverlay = document.getElementById('cloneOverlay');
    const cloneUrlInput = document.getElementById('cloneUrlInput');
    const cloneRunBtn = document.getElementById('cloneRunBtn');
    cloneCard.addEventListener('click', () => {
      cloneUrlInput.value = '';
      cloneOverlay.classList.add('open');
      cloneUrlInput.focus();
    });
    document.getElementById('cloneCancelBtn').addEventListener('click', () => cloneOverlay.classList.remove('open'));
    cloneOverlay.addEventListener('click', (e) => { if (e.target === e.currentTarget) cloneOverlay.classList.remove('open'); });
    cloneUrlInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') runClone();
      if (e.key === 'Escape') cloneOverlay.classList.remove('open');
    });
    cloneRunBtn.addEventListener('click', runClone);
    async function runClone() {
      const url = cloneUrlInput.value.trim();
      if (!url) return;
      const origText = cloneRunBtn.textContent;
      cloneRunBtn.disabled = true; cloneRunBtn.textContent = 'Cloning…';
      try {
        const res = await fetch('/api/projects/clone', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ url }),
        });
        const data = await res.json();
        if (!res.ok || data.error) { alert(data.error || `Clone failed (${res.status})`); return; }
        cloneOverlay.classList.remove('open');
        await loadProjects();
      } catch (err) {
        alert('Clone failed: ' + err.message);
      } finally {
        cloneRunBtn.disabled = false; cloneRunBtn.textContent = origText;
      }
    }

    // Import .zip
    const zipInput = document.getElementById('zipInput');
    const importCard = document.getElementById('importCard');
    importCard.addEventListener('click', () => zipInput.click());
    zipInput.addEventListener('change', async (e) => {
      const file = e.target.files[0];
      e.target.value = '';
      if (!file) return;
      const origLabel = importCard.querySelector('.new-label').textContent;
      importCard.querySelector('.new-label').textContent = 'Uploading…';
      importCard.style.pointerEvents = 'none';
      try {
        const fd = new FormData();
        fd.append('zip', file);
        const res = await fetch('/api/projects/import', { method: 'POST', body: fd });
        const data = await res.json();
        if (!res.ok || data.error) { alert(data.error || `Import failed (${res.status})`); return; }
        await loadProjects();
      } catch (err) {
        alert('Import failed: ' + err.message);
      } finally {
        importCard.querySelector('.new-label').textContent = origLabel;
        importCard.style.pointerEvents = '';
      }
    });

    function escHtml(s) {
      return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
    }

    loadProjects();
  </script>
</body>
</html>
