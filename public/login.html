<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Claude Code Remote — Sign in</title>
  <meta name="theme-color" content="#0d1117">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Claude">
  <link rel="manifest" href="/manifest.json">
  <link rel="apple-touch-icon" href="/icons/icon.svg">
  <link rel="icon" href="/icons/icon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="/style.css">
  <style>
    .login-logo { width: 80px; height: 80px; border-radius: 20px; overflow: hidden; }
    .login-logo img { width: 100%; height: 100%; }
    .login-form { display: flex; flex-direction: column; gap: 12px; width: 100%; max-width: 320px; }
    .login-form label { font-size: 13px; color: var(--text-muted); }
    .login-form input { background: var(--surface2); border: 1px solid var(--border); border-radius: var(--radius-sm); color: var(--text); padding: 10px 12px; font-size: 15px; outline: none; width: 100%; }
    .login-form input:focus { border-color: var(--accent); }
    .login-form .field { display: flex; flex-direction: column; gap: 4px; }
    .login-form .submit { padding: 12px; font-size: 15px; font-weight: 500; margin-top: 4px; }
    .login-error { color: var(--red); font-size: 13px; min-height: 18px; text-align: center; }
  </style>
</head>
<body>
  <div class="login-wrap">
    <div class="login-logo"><img src="/icons/icon.svg" alt="Claude"></div>
    <h1>Claude Code Remote</h1>
    <p>Sign in to control Claude Code from your browser.</p>
    <form class="login-form" id="loginForm" autocomplete="on">
      <div class="field">
        <label for="username">Username</label>
        <input type="text" id="username" name="username" autocomplete="username" required autofocus>
      </div>
      <div class="field">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" autocomplete="current-password" required>
      </div>
      <div class="login-error" id="loginError"></div>
      <button type="submit" class="btn btn-primary submit">Sign in</button>
    </form>
    <script>
      const form = document.getElementById('loginForm');
      const errEl = document.getElementById('loginError');
      form.addEventListener('submit', async (e) => {
        e.preventDefault();
        errEl.textContent = '';
        const username = document.getElementById('username').value.trim();
        const password = document.getElementById('password').value;
        try {
          const r = await fetch('/auth/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ username, password }),
          });
          if (r.ok) {
            location.href = '/terminal';
          } else {
            const j = await r.json().catch(() => ({}));
            errEl.textContent = j.error || 'Sign-in failed';
          }
        } catch (err) {
          errEl.textContent = err.message;
        }
      });
    </script>
  </div>
</body>
</html>
