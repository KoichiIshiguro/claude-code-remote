<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover">
  <title>Claude Code</title>
  <!-- PWA -->
  <meta name="theme-color" content="#0d1117">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Claude">
  <link rel="manifest" href="/manifest.json">
  <link rel="apple-touch-icon" href="/icons/icon.svg">
  <link rel="icon" href="/icons/icon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="/style.css">
  <script src="https://cdn.jsdelivr.net/npm/marked@12/marked.min.js"></script>
  <style>
  /* ── 3-panel app shell ── */
  .app-shell {
    display: flex; height: 100dvh; overflow: hidden; background: var(--bg);
  }

  /* ── Sidebars ── */
  .side {
    width: 240px; flex-shrink: 0;
    display: flex; flex-direction: column;
    background: var(--surface);
    position: relative;
  }
  .side-left  { border-right: 1px solid var(--border); }
  .side-right { border-left:  1px solid var(--border); width: 280px; }

  /* Desktop: hide when not .open so the close button actually closes */
  @media (min-width: 768px) {
    .side:not(.open) { display: none; }
  }

  /* Right-side resize handle (desktop only).
     Sits flush with the left edge of the panel and stays fully inside it so
     it always receives pointer events regardless of neighbor stacking. */
  .side-resize-handle {
    position: absolute; left: 0; top: 0; bottom: 0;
    width: 8px; cursor: col-resize; z-index: 50;
    background: transparent;
    border-left: 1px solid transparent;
    transition: background .15s, border-color .15s;
    touch-action: none;
  }
  .side-resize-handle:hover { background: rgba(255,154,60,.12); border-left-color: var(--accent); }
  .side-resize-handle.resizing { background: rgba(255,154,60,.25); border-left-color: var(--accent); }

  /* Mobile: transform-based drawers, full screen width */
  @media (max-width: 767px) {
    .side {
      position: fixed; top: 0; bottom: 0; width: 100vw; max-width: none;
      z-index: 300; transition: transform .25s ease;
    }
    .side-left  { left: 0;  transform: translateX(-100%); }
    .side-right { right: 0; transform: translateX(100%); width: 100vw; }
    .side.open  { transform: translateX(0) !important; }
    .side-resize-handle { display: none; }
  }

  .side-hdr {
    display: flex; align-items: center; gap: 8px;
    padding: 10px 12px; border-bottom: 1px solid var(--border); flex-shrink: 0;
    font-size: 11px; font-weight: 700; text-transform: uppercase;
    letter-spacing: .08em; color: var(--text-muted);
  }
  .side-hdr span { flex: 1; }
  .side-close {
    background: none; border: none; color: var(--text-muted);
    cursor: pointer; font-size: 18px; padding: 2px 6px; line-height: 1;
    border-radius: 4px;
  }
  .side-close:hover { background: var(--surface2); color: var(--text); }

  /* ── Left: project list ── */
  .proj-list { flex: 1; overflow-y: auto; padding: 6px; }
  .proj-group { margin-bottom: 6px; }
  .proj-group-head {
    display: flex; align-items: center; gap: 8px;
    padding: 8px 10px;
    font-family: 'SF Mono', 'Fira Code', monospace; font-size: 12px;
    color: var(--text);
    font-weight: 600;
  }
  .proj-group-head .proj-name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .proj-new-btn-inline {
    background: transparent; border: 1px solid var(--border);
    color: var(--text-muted); width: 22px; height: 22px;
    border-radius: 4px; cursor: pointer; font-size: 14px; line-height: 1;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  .proj-new-btn-inline:hover { color: var(--accent); border-color: var(--accent); }
  .sess-item {
    display: flex; align-items: center; gap: 8px;
    padding: 7px 10px 7px 22px;
    border-radius: var(--radius-sm);
    cursor: pointer;
    font-family: 'SF Mono', 'Fira Code', monospace; font-size: 12px;
    color: var(--text-muted);
    border: 1px solid transparent;
    transition: all .12s;
  }
  .sess-item:hover { background: var(--surface2); color: var(--text); }
  .sess-item.active { background: var(--accent-dim); color: var(--accent); border-color: var(--accent); }
  .sess-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--border); flex-shrink: 0; }
  .sess-item.running .sess-dot { background: var(--green); }
  .sess-label { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .sess-empty {
    font-size: 11px; color: var(--text-muted); padding: 2px 10px 6px 22px;
    font-style: italic;
  }
  .proj-empty { padding: 20px 12px; text-align: center; color: var(--text-muted); font-size: 13px; }
  .proj-new-area {
    padding: 8px; border-top: 1px solid var(--border); flex-shrink: 0;
  }
  .proj-new-row {
    display: flex; gap: 6px;
  }
  .proj-new-input {
    flex: 1; background: var(--surface2); border: 1px solid var(--border);
    border-radius: var(--radius-sm); color: var(--text); padding: 7px 10px;
    font-size: 13px; outline: none; font-family: 'SF Mono', 'Fira Code', monospace;
  }
  .proj-new-input:focus { border-color: var(--accent); }
  .proj-new-input::placeholder { color: var(--text-muted); }
  .proj-new-btn {
    padding: 7px 12px; background: var(--accent); color: var(--bg);
    border: none; border-radius: var(--radius-sm); font-size: 18px; font-weight: 600;
    cursor: pointer; line-height: 1; flex-shrink: 0;
  }
  .proj-new-btn:hover { opacity: .85; }
  .proj-new-hint { font-size: 11px; color: var(--text-muted); margin-top: 5px; padding: 0 2px; }

  /* Pull-up menu above the "+ 新規プロジェクト" button */
  .pullup-trigger {
    width: 100%; padding: 9px 12px; background: var(--accent); color: var(--bg);
    border: none; border-radius: var(--radius-sm); font-size: 13px; font-weight: 600;
    cursor: pointer; line-height: 1;
  }
  .pullup-trigger:hover { opacity: .9; }
  .pullup-menu {
    position: absolute; bottom: calc(100% + 4px); left: 8px; right: 8px;
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius-sm); padding: 4px; display: none;
    box-shadow: 0 -6px 18px rgba(0,0,0,.35);
    z-index: 60;
  }
  .pullup-menu.on { display: block; }
  .pullup-item {
    display: flex; align-items: center; gap: 10px;
    padding: 9px 10px; cursor: pointer; border-radius: 4px; font-size: 13px;
    color: var(--text);
  }
  .pullup-item:hover { background: var(--surface2); }
  .pullup-item .pi-icon { font-size: 15px; width: 18px; text-align: center; }

  /* Per-project ↻ restore button — sits next to + */
  .proj-restore-btn {
    background: transparent; border: 1px solid var(--border);
    color: var(--text-muted); width: 22px; height: 22px;
    border-radius: 4px; cursor: pointer; font-size: 12px; line-height: 1;
    display: flex; align-items: center; justify-content: center; flex-shrink: 0;
  }
  .proj-restore-btn:hover { color: var(--accent); border-color: var(--accent); }
  .proj-restore-btn.has-archives { color: var(--accent); }

  /* Session-row ⋯ menu */
  .sess-item { position: relative; }
  .sess-menu-btn {
    background: transparent; border: none; color: var(--text-muted);
    width: 20px; height: 20px; font-size: 14px; cursor: pointer;
    border-radius: 3px; flex-shrink: 0; opacity: 0;
    display: flex; align-items: center; justify-content: center; padding: 0;
  }
  .sess-item:hover .sess-menu-btn { opacity: .8; }
  .sess-menu-btn:hover { background: var(--surface2); opacity: 1 !important; }
  .sess-menu-popup {
    position: absolute; right: 6px; top: 100%; margin-top: 2px;
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 4px; padding: 4px; display: none; z-index: 70;
    min-width: 140px; box-shadow: 0 4px 12px rgba(0,0,0,.4);
  }
  .sess-menu-popup.on { display: block; }
  .sess-menu-popup .smi {
    display: block; padding: 7px 10px; font-size: 12px;
    color: var(--text); cursor: pointer; border-radius: 3px;
  }
  .sess-menu-popup .smi:hover { background: var(--surface2); }
  .sess-menu-popup .smi.danger { color: var(--red); }

  /* Restore modal listing rows */
  .restore-section-title {
    font-size: 11px; font-weight: 700; color: var(--text-muted);
    text-transform: uppercase; letter-spacing: .06em;
    margin: 12px 4px 4px;
  }
  .restore-empty { padding: 10px; color: var(--text-muted); font-size: 12px; text-align: center; }
  .restore-row {
    display: flex; flex-direction: column; gap: 2px;
    padding: 8px 10px; border-radius: 4px; cursor: pointer;
    border: 1px solid transparent;
  }
  .restore-row:hover { background: var(--surface2); border-color: var(--border); }
  .restore-row .rr-prev {
    font-size: 13px; color: var(--text); overflow: hidden;
    text-overflow: ellipsis; white-space: nowrap;
  }
  .restore-row .rr-meta {
    font-size: 11px; color: var(--text-muted); font-family: 'SF Mono', monospace;
  }

  /* ── Right: file browser ── */
  .fb-bread {
    display: flex; align-items: center; flex-wrap: wrap; gap: 2px;
    padding: 5px 10px; border-bottom: 1px solid var(--border); flex-shrink: 0;
    font-family: 'SF Mono', 'Fira Code', monospace; font-size: 11px; min-height: 30px;
  }
  .bc-seg { color: var(--accent); cursor: pointer; }
  .bc-seg:hover { text-decoration: underline; }
  .bc-sep { color: var(--border); padding: 0 1px; }
  .fb-list { flex: 1; overflow-y: auto; }
  .fb-item {
    display: flex; align-items: center; gap: 8px;
    padding: 7px 12px; cursor: pointer; transition: background .1s; user-select: none;
  }
  .fb-item:hover { background: var(--surface2); }
  .fi-icon { font-size: 14px; width: 18px; text-align: center; flex-shrink: 0; }
  .fi-name { flex: 1; font-family: 'SF Mono', 'Fira Code', monospace; font-size: 12px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .fi-hidden { opacity: .4; }
  .fb-viewer { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
  .fb-viewer-hdr {
    display: flex; align-items: center; gap: 6px; padding: 6px 10px;
    border-bottom: 1px solid var(--border); flex-shrink: 0;
    font-family: 'SF Mono', 'Fira Code', monospace; font-size: 11px; color: var(--text-muted);
  }
  .fv-path { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .fb-viewer-body { flex: 1; overflow: auto; padding: 10px 12px; }
  .fb-viewer-body pre {
    font-family: 'SF Mono', 'Fira Code', monospace; font-size: 12px;
    color: var(--text); white-space: pre; tab-size: 2; line-height: 1.6; margin: 0;
  }
  .fb-viewer-body .fb-md { font-size: 13px; line-height: 1.6; color: var(--text); min-width: 0; overflow-wrap: anywhere; }
  .fb-viewer-body .fb-md h1,
  .fb-viewer-body .fb-md h2,
  .fb-viewer-body .fb-md h3 { margin-top: 1.2em; margin-bottom: .4em; }
  .fb-viewer-body .fb-md pre { background: var(--surface2); padding: 8px; border-radius: 4px; overflow-x: auto; white-space: pre; max-width: 100%; }
  .fb-viewer-body .fb-md code { font-family: 'SF Mono', monospace; font-size: 12px; }
  .fb-viewer-body .fb-md pre code { white-space: pre; word-break: normal; }
  .fb-viewer-body .fb-md :not(pre) > code { background: var(--surface2); padding: 1px 4px; border-radius: 3px; word-break: break-all; }
  .fb-viewer-body .fb-md a { color: var(--accent); }
  .fb-viewer-body .fb-md img, .fb-viewer-body .fb-md video { max-width: 100%; height: auto; }
  .fb-viewer-body .fb-md table { display: block; max-width: 100%; overflow-x: auto; border-collapse: collapse; margin: 8px 0; }
  .fb-viewer-body .fb-md th, .fb-viewer-body .fb-md td { border: 1px solid var(--border); padding: 4px 8px; white-space: nowrap; }
  .fb-viewer-body .fb-md th { background: var(--surface2); font-weight: 600; text-align: left; }
  /* Image preview */
  .fb-viewer-body .fb-img-wrap {
    display: flex; align-items: center; justify-content: center;
    min-height: 100%;
    color: var(--text-muted); font-size: 12px;
  }
  .fb-viewer-body .fb-img-wrap img {
    max-width: 100%; max-height: calc(100dvh - 120px);
    object-fit: contain; background:
      linear-gradient(45deg, #1a1f27 25%, transparent 25%) 0 0/16px 16px,
      linear-gradient(45deg, transparent 75%, #1a1f27 75%) 0 0/16px 16px,
      linear-gradient(45deg, #1a1f27 25%, transparent 25%) 8px 8px/16px 16px,
      linear-gradient(45deg, transparent 75%, #1a1f27 75%) 8px 8px/16px 16px,
      #0d1117;
    border-radius: 4px;
  }
  /* PDF preview */
  .fb-viewer-body .fb-pdf-wrap { width: 100%; height: calc(100dvh - 90px); }
  .fb-viewer-body .fb-pdf-wrap embed { width: 100%; height: 100%; border: 0; }
  .fb-loading, .fb-empty {
    padding: 20px 12px; text-align: center; color: var(--text-muted); font-size: 13px;
  }

  /* ── Main area ── */
  .chat-main { flex: 1; display: flex; flex-direction: column; overflow: hidden; position: relative; min-width: 0; }

  /* ── Top loader ── */
  .top-loader { position: absolute; top: 0; left: 0; right: 0; height: 3px; z-index: 10; overflow: hidden; pointer-events: none; }
  .top-loader::after { content: ''; display: block; width: 40%; height: 100%; background: linear-gradient(90deg, transparent, var(--accent), transparent); transform: translateX(-100%); }
  .top-loader.active::after { animation: slide-bar 1.4s ease-in-out infinite; }
  @keyframes slide-bar { 0%{transform:translateX(-100%)} 100%{transform:translateX(350%)} }

  /* ── Header ── */
  .chat-hdr {
    display: flex; align-items: center; gap: 8px; padding: 8px 10px;
    background: var(--surface); border-bottom: 1px solid var(--border);
    flex-shrink: 0; padding-top: max(8px, env(safe-area-inset-top, 0px));
  }
  .hdr-btn {
    background: none; border: none; color: var(--text-muted); cursor: pointer;
    font-size: 18px; padding: 4px 6px; line-height: 1; border-radius: 4px; flex-shrink: 0;
  }
  .hdr-btn:hover { background: var(--surface2); color: var(--text); }
  .dir-label { flex: 1; font-family: 'SF Mono', 'Fira Code', monospace; font-size: 12px; color: var(--text-muted); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; min-width: 0; }

  /* ── Working chip ── */
  .working-chip {
    display: none; align-items: center; gap: 5px; padding: 3px 9px;
    background: rgba(217,119,6,.15); border: 1px solid rgba(217,119,6,.35);
    border-radius: 99px; font-size: 12px; color: #d97706; white-space: nowrap; flex-shrink: 0;
  }
  .working-chip.on { display: flex; }
  .dot-anim { display: inline-block; width: 18px; }

  /* ── Claude dot pulse ── */
  .claude-dot { transition: box-shadow .3s; }
  .streaming-active .claude-dot { animation: dot-pulse 1.4s ease-in-out infinite; }
  @keyframes dot-pulse { 0%,100%{box-shadow:0 0 0 0 rgba(217,119,6,.5)} 50%{box-shadow:0 0 0 7px rgba(217,119,6,0)} }

  /* ── Reconnect banner ── */
  .reconnect-banner { display: none; background: rgba(210,153,34,.9); color: #000; text-align: center; font-size: 13px; padding: 5px; font-weight: 500; flex-shrink: 0; }
  .reconnect-banner.on { display: block; }

  /* ── Cancel / Queue ── */
  .btn-stop { display: none; align-items: center; gap: 6px; padding: 5px 12px; background: rgba(248,81,73,.15); border: 1px solid rgba(248,81,73,.4); color: var(--red); border-radius: var(--radius-sm); font-size: 13px; cursor: pointer; }
  .btn-stop.on { display: flex; }
  .btn-stop:hover { background: rgba(248,81,73,.28); }
  .queue-badge { display: none; align-items: center; gap: 5px; padding: 4px 10px; background: var(--accent-dim); border: 1px solid var(--accent); color: var(--accent); border-radius: var(--radius-sm); font-size: 12px; }
  .queue-badge.on { display: flex; }
  .queue-list { display: none; flex-direction: column; gap: 4px; margin-bottom: 6px; }
  .queue-list.on { display: flex; }
  .queue-item { display: flex; align-items: center; gap: 8px; padding: 6px 10px; background: var(--surface2); border-radius: var(--radius-sm); font-size: 12px; color: var(--text-muted); }
  .q-num { background: var(--accent-dim); color: var(--accent); border-radius: 99px; width: 18px; height: 18px; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 600; flex-shrink: 0; }
  .q-text { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .q-remove { background: none; border: none; color: var(--text-muted); cursor: pointer; font-size: 14px; padding: 0 2px; }
  .q-remove:hover { color: var(--red); }
  .status-bar { display: flex; align-items: center; gap: 8px; padding: 4px 0 8px; min-height: 28px; }
  .ctx-meter { margin-left: auto; font-size: 11px; color: var(--text-muted); white-space: nowrap; opacity: .8; }
  .ctx-meter:empty { display: none; }
  .ctx-meter.warn { color: var(--accent); opacity: 1; }
  .ctx-meter.hot { color: var(--red); opacity: 1; font-weight: 500; }

  /* ── AskUserQuestion ── */
  .ask-card { background: var(--surface2); border: 1px solid var(--accent); border-radius: var(--radius-sm); padding: 12px 14px; }
  .ask-q { font-size: 14px; margin-bottom: 10px; color: var(--text); line-height: 1.5; }
  .ask-opts { display: flex; flex-direction: column; gap: 6px; }
  .ask-btn { padding: 8px 14px; border: 1px solid var(--border); border-radius: var(--radius-sm); background: var(--surface); color: var(--text); cursor: pointer; font-size: 13px; text-align: left; transition: all .12s; }
  .ask-btn:hover { background: var(--accent-dim); border-color: var(--accent); color: var(--accent); }
  .ask-btn.chosen { background: var(--accent-dim); border-color: var(--accent); color: var(--accent); pointer-events: none; }
  .ask-note { font-size: 11px; color: var(--text-muted); margin-top: 8px; }

  /* ── msg-cancelled ── */
  .msg-cancelled .bubble { background: rgba(210,153,34,.1); border: 1px solid rgba(210,153,34,.3); color: var(--yellow); padding: 8px 12px; border-radius: var(--radius-sm); font-size: 13px; }

  /* ── Permissions modal ── */
  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.65); z-index: 500; align-items: center; justify-content: center; padding: 20px; }
  .modal-overlay.on { display: flex; }
  .perm-modal { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); width: 100%; max-width: 440px; max-height: 82vh; display: flex; flex-direction: column; overflow: hidden; }
  .perm-hdr { display: flex; align-items: center; padding: 14px 16px; border-bottom: 1px solid var(--border); flex-shrink: 0; }
  .perm-hdr h3 { flex: 1; font-size: 15px; font-weight: 600; }
  .perm-body { flex: 1; overflow-y: auto; padding: 16px; }
  .perm-all { display: flex; align-items: flex-start; gap: 12px; padding: 10px 12px; background: var(--surface2); border-radius: var(--radius-sm); margin-bottom: 16px; cursor: pointer; }
  .perm-all-text { flex: 1; }
  .perm-all-text b { display: block; font-size: 14px; margin-bottom: 2px; }
  .perm-all-text small { font-size: 12px; color: var(--text-muted); }
  .perm-group { margin-bottom: 14px; }
  .perm-group-title { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .06em; color: var(--text-muted); margin-bottom: 6px; }
  .perm-row { display: flex; align-items: center; gap: 10px; padding: 7px 4px; border-bottom: 1px solid var(--surface2); cursor: pointer; }
  .perm-row:last-child { border-bottom: none; }
  .perm-row label { flex: 1; font-size: 13px; cursor: pointer; display: flex; align-items: center; gap: 8px; }
  .perm-row small { color: var(--text-muted); font-size: 11px; white-space: nowrap; }
  input[type=checkbox] { width: 16px; height: 16px; accent-color: var(--accent); cursor: pointer; flex-shrink: 0; }
  .perm-ftr { padding: 12px 16px; border-top: 1px solid var(--border); display: flex; justify-content: flex-end; gap: 8px; flex-shrink: 0; }
  .btn-save { padding: 8px 20px; background: var(--accent); color: var(--bg); border: none; border-radius: var(--radius-sm); font-size: 14px; font-weight: 500; cursor: pointer; }
  .btn-save:hover { opacity: .85; }
  .btn-ghost { padding: 8px 16px; background: none; color: var(--text-muted); border: 1px solid var(--border); border-radius: var(--radius-sm); font-size: 14px; cursor: pointer; }
  .btn-ghost:hover { background: var(--surface2); }

  /* ── Backdrop (mobile sidebar overlay) ── */
  .backdrop { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.5); z-index: 200; }
  .backdrop.on { display: block; }

  /* ── Bottom nav (mobile only) ── */
  .bottom-nav {
    display: none;
    background: var(--surface); border-top: 1px solid var(--border);
    padding-bottom: env(safe-area-inset-bottom, 0); flex-shrink: 0;
  }
  .bottom-nav-inner { display: flex; }
  .bnav-btn {
    flex: 1; display: flex; flex-direction: column; align-items: center;
    gap: 2px; padding: 8px 4px; background: none; border: none;
    color: var(--text-muted); cursor: pointer; font-size: 10px; font-weight: 500;
    min-height: 52px; transition: color .15s;
  }
  .bnav-btn .bnav-icon { font-size: 22px; line-height: 1; }
  .bnav-btn.active { color: var(--accent); }
  .bnav-btn:hover { color: var(--text); }

  @media (max-width: 767px) {
    .bottom-nav { display: block; }

  </style>

<script>
'use strict';
const sessionId = new URLSearchParams(location.search).get('session');
if (!sessionId) location.href = '/app';
const WS_URL = `${location.protocol === 'https:' ? 'wss' : 'ws'}://${location.host}`;
marked.setOptions({ breaks: true, gfm: true });

// ── Register service worker ───────────────────────────────────────────────────
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('/sw.js').catch(() => {});
}

// ── Markdown: open all links in a new tab ─────────────────────────────────────
// We post-process the rendered DOM rather than overriding marked's link
// renderer — the v12 link(token) override is fragile across `marked.use({...})`
// (the inner tokens get lost when called via prototype). DOM rewriting is
// simple and version-proof.
function openLinksInNewTab(root) {
  root.querySelectorAll('a[href]').forEach(a => {
    a.target = '_blank';
    a.rel = 'noopener noreferrer';
  });
}

// ── State ─────────────────────────────────────────────────────────────────────
let ws, isStreaming = false, pendingImages = [], dotTimer = null;
let currentAssistantEl = null, currentTextEl = null, streamingText = '';
let currentToolEls = {}, promptQueue = [];
let allowedTools = null;
let fbCurrentDir = '', fbSessionRoot = '';

// ── WebSocket ─────────────────────────────────────────────────────────────────
// Browser WebSocket API cannot expose the HTTP status code that the server
// returned during the upgrade (always reports close code 1006). To distinguish
// "server restarting" from "session expired", probe /api/auth/status over HTTP
// before (re)connecting and redirect to /login on 401.
async function checkAuthOrRedirect() {
  try {
    const r = await fetch('/api/auth/status', { credentials: 'same-origin' });
    if (r.status === 401) {
      location.href = '/login';
      return false;
    }
    return r.ok;
  } catch {
    // Network error — server is down. Stay on the page and let the caller retry.
    return null;
  }
}

async function connect() {
  const ok = await checkAuthOrRedirect();
  if (ok === false) return; // redirecting to /login
  if (ok === null) {
    // Server unreachable — show banner and retry
    document.getElementById('reconnectBanner').classList.add('on');
    setTimeout(connect, 2000);
    return;
  }
  ws = new WebSocket(WS_URL);
  ws.addEventListener('open', () => {
    document.getElementById('reconnectBanner').classList.remove('on');
    ws.send(JSON.stringify({ type: 'attach', sessionId }));
    // Always refresh project + session lists on (re)connect — the sidebar may
    // have been opened during a disconnect, dropping its wsSend.
    if (typeof refreshProjects === 'function') refreshProjects();
    else ws.send(JSON.stringify({ type: 'list_sessions' }));
  });
  ws.addEventListener('message', e => handleMessage(JSON.parse(e.data)));
  ws.addEventListener('close', () => {
    document.getElementById('reconnectBanner').classList.add('on');
    setTimeout(connect, 2000);
  });
}
function wsSend(obj) { if (ws && ws.readyState === WebSocket.OPEN) ws.send(JSON.stringify(obj)); }

// ── Message handling ──────────────────────────────────────────────────────────
function handleMessage(msg) {
  switch (msg.type) {
    case 'history': {
      const dir = msg.directory || '';
      document.getElementById('dirLabel').textContent = dir || sessionId;
      document.getElementById('messages').innerHTML = '';
      allowedTools = msg.allowedTools ?? null;
      updateCtxPill(msg.lastTokens);
      for (const e of msg.history) renderHistoryEntry(e);
      if (msg.streaming) {
        isStreaming = true;
        currentAssistantEl = createAssistantMessage();
        currentTextEl = null; streamingText = ''; currentToolEls = {};
        if (msg.currentEntry) renderBlocks(currentAssistantEl.querySelector('.assistant-content'), msg.currentEntry.blocks);
        setStreamingUI(true);
      } else {
        // Server says not streaming — reset any stale local streaming state
        // (e.g. WS dropped mid-response, server finished, then we reattached).
        isStreaming = false;
        currentAssistantEl = null; currentTextEl = null; streamingText = '';
        currentToolEls = {};
        setStreamingUI(false);
      }
      fbSessionRoot = dir;
      fbCurrentDir = dir;
      if (dir) loadDir(dir);
      scrollToBottom();
      break;
    }
    case 'stream_start':
      isStreaming = true; setStreamingUI(true);
      currentAssistantEl = createAssistantMessage();
      currentTextEl = null; streamingText = ''; currentToolEls = {};
      break;
    case 'stream_event':
      handleStreamEvent(msg.event); break;
    case 'stream_end':
      isStreaming = false;
      if (currentTextEl && streamingText) { currentTextEl.innerHTML = marked.parse(streamingText); openLinksInNewTab(currentTextEl); removeCursor(currentTextEl); }
      currentAssistantEl = null; currentTextEl = null; streamingText = '';
      scrollToBottom();
      if (promptQueue.length > 0) {
        const next = promptQueue.shift(); renderQueue(); dispatchPrompt(next.text, next.uploadedPaths);
      } else { setStreamingUI(false); }
      break;
    case 'sessions_list':
      _sessions = msg.sessions || [];
      rerenderProjList();
      break;
    case 'session_created':
      location.href = `/terminal?session=${msg.session.id}`;
      break;
    case 'session_assigned':
      // A placeholder session created via create_session has just been
      // assigned its real Claude session id by the CLI's init event.
      // Swap our in-memory id and the URL so subsequent attach/send_prompt
      // calls reach the right key without a page reload.
      if (msg.placeholderId === sessionId) {
        sessionId = msg.sessionId;
        try { history.replaceState({}, '', `/terminal?session=${sessionId}`); } catch {}
      }
      break;
    case 'archived_list':
      renderArchivedList(msg.projectPath, msg.sessions || []);
      break;
    case 'archive_ok':
    case 'restore_ok':
    case 'purge_ok':
    case 'project_added':
    case 'project_removed':
      // Server has already broadcast sessions_list right after each of these;
      // also refresh project list if a project changed.
      if (msg.type === 'project_added' || msg.type === 'project_removed') refreshProjects();
      if (msg.type === 'restore_ok' && _restoreProject) {
        // Re-fetch the archived view so the row disappears from "archived" and
        // (if any) reappears in the main sidebar.
        wsSend({ type: 'list_archived', projectPath: _restoreProject.path });
      }
      if (msg.type === 'purge_ok' && msg.sessionId === sessionId) {
        // The session we were viewing got physically deleted — bounce home.
        location.href = '/app';
      }
      break;
    case 'permissions_updated':
      if (msg.sessionId === sessionId) allowedTools = msg.allowedTools;
      break;
    case 'summary':
      if (msg.sessionId === sessionId) showSummary(msg.text);
      break;
    case 'summary_error':
      if (msg.sessionId === sessionId) showSummary('要約に失敗しました: ' + msg.message, true);
      break;
    case 'error':
      isStreaming = false; setStreamingUI(false); appendError(msg.message); break;
  }
}

// ── Context size indicator ────────────────────────────────────────────────────
// Thresholds match the server's auto-compact logic (167k default = TUI ~83.5%).
function updateCtxPill(tokens) {
  const pill = document.getElementById('ctxPill');
  const meter = document.getElementById('ctxMeter');
  if (!tokens) {
    if (pill) { pill.textContent = ''; pill.className = 'ctx-pill'; }
    if (meter) { meter.textContent = ''; meter.className = 'ctx-meter'; }
    return;
  }
  const k = (tokens / 1000).toFixed(tokens >= 100_000 ? 0 : 1);
  const cls = tokens > 167_000 ? 'hot' : tokens > 100_000 ? 'warn' : '';
  if (pill) {
    pill.textContent = `${k}k`;
    pill.className = 'ctx-pill' + (cls ? ' ' + cls : '');
  }
  if (meter) {
    const pct = Math.round((tokens / 200_000) * 100);
    const tail = tokens > 167_000 ? ' · auto-compacting next turn'
               : tokens > 100_000 ? ` · ${pct}%`
               : '';
    meter.textContent = `Context: ${k}k tokens${tail}`;
    meter.className = 'ctx-meter' + (cls ? ' ' + cls : '');
  }
}

// ── History rendering ─────────────────────────────────────────────────────────
function renderHistoryEntry(entry) {
  if (entry.type === 'user') {
    const m = document.createElement('div'); m.className = 'msg msg-user';
    const imgs = entry.imageCount > 0 ? `<div style="font-size:11px;color:var(--text-muted);text-align:right;margin-bottom:3px">📎 ${entry.imageCount} file${entry.imageCount > 1 ? 's' : ''}</div>` : '';
    m.innerHTML = `${imgs}<div class="bubble">${escHtml(entry.text)}</div>`;
    document.getElementById('messages').appendChild(m);
  } else if (entry.type === 'assistant') {
    const m = createAssistantMessage();
    const c = m.querySelector('.assistant-content');
    renderBlocks(c, entry.blocks);
    if (entry.cost != null) { const p = document.createElement('div'); p.className = 'usage-pill'; p.textContent = `$${entry.cost.toFixed(4)}`; c.appendChild(p); }
    if (entry.cancelled) appendCancelled();
    if (entry.interrupted) {
      const note = document.createElement('div');
      note.style.cssText = 'font-size:12px;color:var(--text-muted);margin-top:6px;padding:6px 10px;background:var(--surface2);border-left:3px solid var(--accent);border-radius:4px';
      note.textContent = '⚠ Interrupted by a server restart. Type "continue" to resume.';
      c.appendChild(note);
    }
  } else if (entry.type === 'error') { appendError(entry.message); }
}

function renderBlocks(container, blocks) {
  for (const b of (blocks || [])) {
    if (b.kind === 'text') {
      const el = document.createElement('div'); el.className = 'md-text';
      el.innerHTML = marked.parse(b.text); openLinksInNewTab(el); container.appendChild(el);
    } else if (b.kind === 'tool') {
      const card = buildToolCard(b.name, b.title);
      if (b.result !== null) card.querySelector('.tool-card-body pre').textContent = b.result;
      container.appendChild(card);
    } else if (b.kind === 'thinking') {
      container.appendChild(buildThinking(b.text));
    } else if (b.kind === 'ask') {
      container.appendChild(buildAskCard(b, false));
    }
  }
}

// ── Live stream ───────────────────────────────────────────────────────────────
function handleStreamEvent(event) {
  if (!currentAssistantEl) return;
  const c = currentAssistantEl.querySelector('.assistant-content');
  switch (event.type) {
    case 'assistant':
      // Per-API-call usage = real context size at this point. Matches TUI's
      // /compact metric. The result event's usage is a turn-aggregate and
      // over-counts when many tools are called in one turn.
      if (event.message?.usage) {
        const u = event.message.usage;
        const total = (u.input_tokens || 0) + (u.cache_read_input_tokens || 0) + (u.cache_creation_input_tokens || 0);
        updateCtxPill(total);
      }
      for (const blk of (event.message?.content || [])) {
        if (blk.type === 'text') { appendStreamText(c, blk.text); }
        else if (blk.type === 'tool_use') {
          finalizeText();
          if (blk.name === 'AskUserQuestion') {
            const card = buildAskCard({ question: blk.input?.question||'', options: blk.input?.options||[], toolId: blk.id, result: null }, true);
            currentToolEls[blk.id] = card; c.appendChild(card);
          } else {
            const card = buildToolCard(blk.name, getToolTitle(blk.name, blk.input));
            currentToolEls[blk.id] = card.querySelector('.tool-card-body pre'); c.appendChild(card);
          }
        } else if (blk.type === 'thinking') { finalizeText(); c.appendChild(buildThinking(blk.thinking)); }
      }
      break;
    case 'tool': {
      const ref = currentToolEls[event.tool_use_id];
      if (ref instanceof HTMLPreElement) {
        const r = typeof event.content === 'string' ? event.content : JSON.stringify(event.content, null, 2);
        ref.textContent = r.length > 4000 ? r.slice(0, 4000) + '\n…(truncated)' : r;
      }
      break;
    }
    case 'result':
      if (event.total_cost_usd != null) { const p = document.createElement('div'); p.className = 'usage-pill'; p.textContent = `$${event.total_cost_usd.toFixed(4)}`; c.appendChild(p); }
      break;
    case 'cancelled': finalizeText(); appendCancelled(); break;
  }
  scrollToBottom();
}

// ── Streaming UI ──────────────────────────────────────────────────────────────
function setStreamingUI(active) {
  document.getElementById('topLoader').classList.toggle('active', active);
  document.getElementById('workingChip').classList.toggle('on', active);
  document.getElementById('cancelBtn').classList.toggle('on', active || promptQueue.length > 0);
  document.getElementById('messages').classList.toggle('streaming-active', active);

// Drag & drop anywhere on the window — any file type. Claude's Read tool handles
// text, code, PDFs, etc.; images are previewed as thumbnails.
(function setupDragDrop() {
  // Counter pattern: dragenter/dragleave fire on every child, so depth-track them.
  let depth = 0;
  const isFileDrag = e => Array.from(e.dataTransfer?.types || []).includes('Files');

  window.addEventListener('dragenter', e => {
    if (!isFileDrag(e)) return;
    depth++;
    document.body.classList.add('drag-over');
  });
  window.addEventListener('dragleave', e => {
    if (!isFileDrag(e)) return;
    depth = Math.max(0, depth - 1);
    if (depth === 0) document.body.classList.remove('drag-over');
  });
  window.addEventListener('dragover', e => {
    // Required for `drop` to fire.
    if (isFileDrag(e)) e.preventDefault();
  });
  window.addEventListener('drop', e => {
    if (!isFileDrag(e)) return;
    e.preventDefault();
    depth = 0;
    document.body.classList.remove('drag-over');
    for (const f of e.dataTransfer.files) addFile(f);
  });
})();

function addFile(file) {
  if (file.type.startsWith('image/')) {
    const r = new FileReader();
    r.onload = e => {
      pendingImages.push({ file, dataUrl: e.target.result, kind: 'image' });
      renderImgPreviews();
    };
    r.readAsDataURL(file);
  } else {
    pendingImages.push({ file, kind: 'file', name: file.name, size: file.size });
    renderImgPreviews();
  }
}
function fmtBytes(n) {
  if (n < 1024) return n + ' B';
  if (n < 1024 * 1024) return (n / 1024).toFixed(1) + ' KB';
  return (n / 1024 / 1024).toFixed(1) + ' MB';
}
function renderImgPreviews() {
  const c = document.getElementById('imagePreviews');
  c.innerHTML = '';
  pendingImages.forEach((p, i) => {
    const el = document.createElement('div');
    el.className = 'preview-item';
    if (p.kind === 'image') {
      el.innerHTML = `<img src="${p.dataUrl}"><button class="remove-img" aria-label="Remove">×</button>`;
    } else {
      el.classList.add('preview-file');
      el.innerHTML = `<div class="file-chip"><span class="file-icon">📄</span><span class="file-name">${escHtml(p.name)}</span><span class="file-size">${fmtBytes(p.size)}</span></div><button class="remove-img" aria-label="Remove">×</button>`;
    }
    el.querySelector('.remove-img').addEventListener('click', () => {
      pendingImages.splice(i, 1);
      renderImgPreviews();
    });
    c.appendChild(el);
  });
}

// Right sidebar resize (desktop only)
(function setupRightResize() {
  const sideR = document.getElementById('sideR');
  const handle = document.getElementById('sideR-resize');
  let resizing = false, pointerId = null;

  const onMove = (e) => {
    if (!resizing) return;
    const newWidth = window.innerWidth - e.clientX;
    const clamped = Math.max(220, Math.min(window.innerWidth - 320, newWidth));
    sideR.style.width = clamped + 'px';
    e.preventDefault();
  };
  const onEnd = (e) => {
    if (!resizing) return;
    resizing = false;
    handle.classList.remove('resizing');
    document.body.style.cursor = '';
    document.body.style.userSelect = '';
    try { handle.releasePointerCapture(pointerId); } catch {}
    pointerId = null;
    localStorage.setItem('sideR-width', sideR.style.width);
  };

  handle.addEventListener('pointerdown', (e) => {
    if (isMobile()) return;
    resizing = true;
    pointerId = e.pointerId;
    handle.classList.add('resizing');
    document.body.style.cursor = 'col-resize';
    document.body.style.userSelect = 'none';
    try { handle.setPointerCapture(e.pointerId); } catch {}
    e.preventDefault();
  });
  // Listen on both the handle and window — once we set pointer capture, events
  // come back to the handle, but window listeners are the safety net for the
  // case where capture is denied (some browsers throw on contextmenu / focus loss).
  handle.addEventListener('pointermove', onMove);
  window.addEventListener('pointermove', onMove);
  handle.addEventListener('pointerup', onEnd);
  window.addEventListener('pointerup', onEnd);
  handle.addEventListener('pointercancel', onEnd);
})();

// Left sidebar = BASE_DIR projects (filesystem) merged with active sessions (memory).
// _projects comes from REST /api/projects, _sessions comes from WS list_sessions.
let _projects = [];

function rerenderProjList() {
  const list = document.getElementById('projList');
  list.innerHTML = '';
  closeAllSessMenus();

  const sessByDir = new Map();
  for (const s of _sessions) {
    if (!sessByDir.has(s.directory)) sessByDir.set(s.directory, []);
    sessByDir.get(s.directory).push(s);
  }
  for (const arr of sessByDir.values()) {
    arr.sort((a, b) => new Date(b.lastActivity) - new Date(a.lastActivity));
  }

  if (!_projects.length) {
    list.innerHTML = '<div class="proj-empty">No projects yet</div>';
    return;
  }

  for (const p of _projects) {
    const sessions = sessByDir.get(p.path) || [];

    const group = document.createElement('div');
    group.className = 'proj-group';

    const head = document.createElement('div');
    head.className = 'proj-group-head';
    head.innerHTML = `<span class="proj-name" title="${escHtml(p.path)}">${escHtml(p.name)}</span>`;

    const restoreBtn = document.createElement('button');
    restoreBtn.className = 'proj-restore-btn';
    restoreBtn.title = 'Restore archived sessions for this folder';
    restoreBtn.textContent = '↻';
    restoreBtn.addEventListener('click', (ev) => {
      ev.stopPropagation();
      openRestoreModal(p);
    });
    head.appendChild(restoreBtn);

    const newBtn = document.createElement('button');
    newBtn.className = 'proj-new-btn-inline';
    newBtn.title = 'New session in this folder';
    newBtn.textContent = '+';
    newBtn.addEventListener('click', (ev) => {
      ev.stopPropagation();
      wsSend({ type: 'create_session', directory: p.path });
    });
    head.appendChild(newBtn);
    group.appendChild(head);

    if (sessions.length === 0) {
      const empty = document.createElement('div');
      empty.className = 'sess-empty';
      empty.textContent = 'No sessions';
      group.appendChild(empty);
    } else {
      for (const s of sessions) {
        const isActive = s.id === sessionId;
        const label = (s.preview && s.preview.trim()) ? s.preview : 'New session';
        const item = document.createElement('div');
        item.className = 'sess-item'
          + (s.streaming ? ' running' : '')
          + (isActive ? ' active' : '');
        item.innerHTML = `<span class="sess-dot"></span><span class="sess-label">${escHtml(label)}</span>`;
        item.addEventListener('click', () => {
          if (isActive) return;
          location.href = `/terminal?session=${s.id}`;
        });

        const menuBtn = document.createElement('button');
        menuBtn.className = 'sess-menu-btn';
        menuBtn.title = 'Session actions';
        menuBtn.textContent = '⋯';
        menuBtn.addEventListener('click', (ev) => {
          ev.stopPropagation();
          toggleSessMenu(item, s);
        });
        item.appendChild(menuBtn);

        group.appendChild(item);
      }
    }
    list.appendChild(group);
  }
}

      const prev = (s.preview && s.preview.trim()) ? s.preview : '(no preview)';
      row.innerHTML = `<div class="rr-prev">${escHtml(prev)}</div>` +
                      `<div class="rr-meta">${new Date(s.mtime).toISOString().slice(0,16).replace('T',' ')} · ${s.sessionId.slice(0,8)}</div>`;
      row.addEventListener('click', () => {
        wsSend({ type: 'restore_session', sessionId: s.sessionId });
      });
      body.appendChild(row);
    }
  };

  section('アーカイブ済み', archived);
  section('新しく見つかったセッション (TUI 由来など)', discovered);
}

// ── File browser ──────────────────────────────────────────────────────────────
async function loadDir(dir) {
  fbCurrentDir = dir;
  const content = document.getElementById('fbContent');
  content.innerHTML = '<div class="fb-loading">Loading…</div>';
  renderBread(dir);
  try {
    const r = await fetch(`/api/files?dir=${encodeURIComponent(dir)}`);
    const data = await r.json();
    if (data.error) { content.innerHTML = `<div class="fb-empty">Error: ${escHtml(data.error)}</div>`; return; }
    const list = document.createElement('div'); list.className = 'fb-list'; list.style.flex = '1'; list.style.overflowY = 'auto';
    if (!data.items.length) { list.innerHTML = '<div class="fb-empty">Empty directory</div>'; }
    for (const item of data.items) {
      const el = document.createElement('div');
      el.className = 'fb-item' + (item.hidden ? ' fi-hidden' : '');
      const icon = item.type === 'dir' ? '📁' : getFileIcon(item.name);
      el.innerHTML = `<span class="fi-icon">${icon}</span><span class="fi-name">${escHtml(item.name)}</span>`;
      const fullPath = dir.replace(/\/+$/, '') + '/' + item.name;
      if (item.type === 'dir') el.addEventListener('dblclick', () => loadDir(fullPath));
      else el.addEventListener('dblclick', () => viewFile(fullPath, item.name));
      el.title = `${item.type === 'dir' ? 'Folder' : 'File'}: ${item.name}\nDouble-click to ${item.type === 'dir' ? 'open' : 'view'}`;
      list.appendChild(el);
    }
    content.innerHTML = ''; content.appendChild(list);
  } catch { content.innerHTML = '<div class="fb-empty">Failed to load</div>'; }
}

async function viewFile(filePath, name) {
  const content = document.getElementById('fbContent');
  const isMd    = /\.(md|markdown)$/i.test(name);
  const isImg   = /\.(png|jpe?g|gif|webp|bmp|svg|ico|avif)$/i.test(name);
  const isPdf   = /\.pdf$/i.test(name);

  let bodyInner;
  if (isImg)      bodyInner = '<div class="fb-img-wrap">Loading…</div>';
  else if (isPdf) bodyInner = '<div class="fb-pdf-wrap">Loading…</div>';
  else if (isMd)  bodyInner = '<div class="fb-md md-text">Loading…</div>';
  else            bodyInner = '<pre>Loading…</pre>';

  content.innerHTML = `<div class="fb-viewer"><div class="fb-viewer-hdr"><span class="fv-path">${escHtml(name)}</span><button class="side-close" id="fbBack">×</button></div><div class="fb-viewer-body">${bodyInner}</div></div>`;
  content.querySelector('#fbBack').addEventListener('click', () => loadDir(fbCurrentDir));

  // Binary files go straight to /api/file/raw via <img> / <embed>.
  if (isImg) {
    const wrap = content.querySelector('.fb-img-wrap');
    wrap.innerHTML = `<img alt="${escHtml(name)}" src="/api/file/raw?path=${encodeURIComponent(filePath)}">`;
    return;
  }
  if (isPdf) {
    const wrap = content.querySelector('.fb-pdf-wrap');
    wrap.innerHTML = `<embed type="application/pdf" src="/api/file/raw?path=${encodeURIComponent(filePath)}">`;
    return;
  }

  // Text / Markdown go through /api/file (utf-8 JSON).
  try {
    const r = await fetch(`/api/file?path=${encodeURIComponent(filePath)}`);
    const data = await r.json();
    const target = content.querySelector(isMd ? '.fb-md' : 'pre');
    if (data.error) {
      target.textContent = 'Error: ' + data.error;
    } else if (isMd) {
      target.innerHTML = marked.parse(data.content || '');
      openLinksInNewTab(target);
    } else {
      target.textContent = data.content || '(empty)';
    }
  } catch {
    const target = content.querySelector(isMd ? '.fb-md' : 'pre');
    target.textContent = 'Failed to load';
  }
}

function renderBread(dir) {
  const bread = document.getElementById('fbBread'); bread.innerHTML = '';
  // Build path relative to session root
  let rel = dir;
  if (fbSessionRoot && dir.startsWith(fbSessionRoot)) rel = dir.slice(fbSessionRoot.length) || '';
  const segs = rel.split('/').filter(Boolean);

  const root = document.createElement('span'); root.className = 'bc-seg'; root.textContent = '~';
  root.addEventListener('click', () => loadDir(fbSessionRoot)); bread.appendChild(root);

  let built = fbSessionRoot;
  for (const seg of segs) {
    built = built.replace(/\/+$/, '') + '/' + seg;
    const sep = document.createElement('span'); sep.className = 'bc-sep'; sep.textContent = '/'; bread.appendChild(sep);
    const s = document.createElement('span'); s.className = 'bc-seg'; s.textContent = seg;
    const p = built;
    s.addEventListener('click', () => loadDir(p)); bread.appendChild(s);
  }
}

function getFileIcon(name) {
  const ext = (name.split('.').pop() || '').toLowerCase();
  const m = {js:'🟨',ts:'🔷',jsx:'🟨',tsx:'🔷',html:'🌐',css:'🎨',json:'📋',md:'📝',py:'🐍',sh:'⚙️',txt:'📄',png:'🖼',jpg:'🖼',jpeg:'🖼',gif:'🖼',svg:'🖼',pdf:'📕',zip:'🗜',env:'🔐',gitignore:'🙈'};
  return m[ext] || '📄';
}

// ── Summary modal ─────────────────────────────────────────────────────────────
// クリック → モーダル表示 → サーバーが要約を返す (または前回キャッシュを返す) → 表示。
// 履歴に変化がなければサーバー側で API は呼ばれないので連打しても課金されない。
const summaryOverlay = document.getElementById('summaryOverlay');
const summaryBody = document.getElementById('summaryBody');
const summaryBtn = document.getElementById('summaryBtn');

summaryBtn.addEventListener('click', requestSummary);
document.getElementById('summaryClose').addEventListener('click', closeSummary);
document.getElementById('summaryDismiss').addEventListener('click', closeSummary);
summaryOverlay.addEventListener('click', e => { if (e.target === e.currentTarget) closeSummary(); });

function requestSummary() {
  summaryBody.textContent = '要約中…';
  summaryBody.style.color = '';
  summaryOverlay.classList.add('on');
  wsSend({ type: 'request_summary', sessionId });
}
function showSummary(text, isError) {
  summaryBody.textContent = text || '(空の応答)';
  summaryBody.style.color = isError ? 'var(--yellow, #d29922)' : '';
}
function closeSummary() { summaryOverlay.classList.remove('on'); }

// ── Permissions modal ─────────────────────────────────────────────────────────
const permAll = document.getElementById('permAll');
const permToolsWrap = document.getElementById('permToolsWrap');

document.getElementById('permBtn').addEventListener('click', openPermModal);
document.getElementById('permClose').addEventListener('click', closePermModal);
document.getElementById('permCancel').addEventListener('click', closePermModal);
document.getElementById('permSave').addEventListener('click', savePerms);
document.getElementById('permOverlay').addEventListener('click', e => { if(e.target===e.currentTarget) closePermModal(); });

permAll.addEventListener('change', () => {
  permToolsWrap.style.opacity = permAll.checked ? '.4' : '1';
  permToolsWrap.querySelectorAll('input[type=checkbox]').forEach(cb => cb.disabled = permAll.checked);
});

function openPermModal() {
  if (allowedTools === null) {
    permAll.checked = true;
    permToolsWrap.style.opacity = '.4';
    permToolsWrap.querySelectorAll('input[data-tool]').forEach(cb => { cb.checked=false; cb.disabled=true; });
  } else {
    permAll.checked = false;
    permToolsWrap.style.opacity = '1';
    permToolsWrap.querySelectorAll('input[data-tool]').forEach(cb => { cb.checked = allowedTools.includes(cb.dataset.tool); cb.disabled=false; });
  }
  document.getElementById('permOverlay').classList.add('on');
}
function closePermModal() { document.getElementById('permOverlay').classList.remove('on'); }
function savePerms() {
  const newAllowed = permAll.checked ? null : Array.from(permToolsWrap.querySelectorAll('input[data-tool]:checked')).map(cb => cb.dataset.tool);
  wsSend({type:'update_permissions',sessionId,allowedTools:newAllowed});
  allowedTools = newAllowed; closePermModal();
}

// ── Helpers ───────────────────────────────────────────────────────────────────
function autoResize(el) { el.style.height='auto'; el.style.height=Math.min(el.scrollHeight,180)+'px'; }
function scrollToBottom() { const m=document.getElementById('messages'); m.scrollTop=m.scrollHeight; }
function escHtml(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

connect();
</script>
